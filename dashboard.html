<!DOCTYPE html>
<html lang="hy">
<head>

</head>
<body>
    <div class="lux-bg-gradient"></div>
    <header class="lux-header" id="luxHeader">

            <div class="lux-lang-switcher"><button class="lang-btn" data-lang="hy">HY</button><button class="lang-btn" data-lang="ru">RU</button><button class="lang-btn" data-lang="en">EN</button></div>

    <div class="lux-mobile-menu" id="mobileMenu" aria-hidden="true"><a href="index.html#features" data-i18n="nav_features">Features</a><a href="templates.html" data-i18n="nav_templates">Templates</a><a href="pricing.html" data-i18n="nav_pricing">Pricing</a><a href="constructor.html" data-i18n="nav_create">Create New</a></div>
    <section class="lux-dashboard"><div class="container">
        <div class="lux-section-title"><div class="lux-section-pre" data-i18n="dash_pre">DASHBOARD</div><h2 class="lux-section-heading" data-i18n="dash_title">Your Invitations</h2></div>
        <div class="lux-dash-stats">
            <div class="lux-dash-stat-card"><h3 id="statTotal">0</h3><p data-i18n="dash_total">Total Invitations</p></div>
            <div class="lux-dash-stat-card"><h3 id="statViews">0</h3><p data-i18n="dash_views">Views</p></div>

        </div>
        <h3 class="section-subheading" data-i18n="dash_your_invs">Your Invitations</h3>
        <div class="lux-dash-list" id="invList">
            <div class="lux-dash-item"><div><h4>Ani & Davit — Wedding</h4><p>Created: July 20, 2026</p></div><div style="display:flex;gap:12px;"><a href="invitation.html" class="lux-btn-secondary" data-i18n="dash_view">View</a><a href="constructor.html" class="lux-btn-primary" data-i18n="dash_edit">Edit</a></div></div>

    <footer class="lux-footer"><div class="container"><div class="lux-footer-bottom"><p data-i18n="footer_copyright">© 2026 LUXE INVITE. All rights reserved.</p></div></div></footer>
    <div id="luxToast" class="lux-toast" aria-live="polite"></div>
    <script src="js/app.js" defer></script>
    <script>
    const D_T={hy:{nav_features:'Հնարավորություններ',nav_templates:'Նախագծեր',nav_pricing:'Գներ',nav_create:'Ստեղծել նոր',dash_pre:'ՎԱՀԱՆԱԿ',dash_title:'Քո հրավերները',dash_total:'Ընդհանուր հրավերներ',dash_views:'Դիտումներ',dash_rsvps:'RSVP-ներ',dash_your_invs:'Քո հրավերները',dash_view:'Դիտել',dash_edit:'Խմբագրել',dash_create:'Ստեղծել նոր հրավեր',footer_copyright:'© 2026 LUXE INVITE. Բոլոր իրավունքները պաշտպանված են։'},ru:{nav_features:'Возможности',nav_templates:'Шаблоны',nav_pricing:'Цены',nav_create:'Создать',dash_pre:'ПАНЕЛЬ',dash_title:'Ваши приглашения',dash_total:'Всего приглашений',dash_views:'Просмотры',dash_rsvps:'RSVP',dash_your_invs:'Ваши приглашения',dash_view:'Просмотр',dash_edit:'Редактировать',dash_create:'Создать новое',footer_copyright:'© 2026 LUXE INVITE. Все права защищены.'},en:{nav_features:'Features',nav_templates:'Templates',nav_pricing:'Pricing',nav_create:'Create New',dash_pre:'DASHBOARD',dash_title:'Your Invitations',dash_total:'Total Invitations',dash_views:'Views',dash_rsvps:'RSVPs',dash_your_invs:'Your Invitations',dash_view:'View',dash_edit:'Edit',dash_create:'Create New Invitation',footer_copyright:'© 2026 LUXE INVITE. All rights reserved.'}};
    let cl=localStorage.getItem('lux_lang')||'hy';
    function sl(l){cl=l;localStorage.setItem('lux_lang',l);document.documentElement.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));const d=D_T[l]||D_T.en;document.querySelectorAll('[data-i18n]').forEach(e=>{const k=e.getAttribute('data-i18n');if(d[k])e.textContent=d[k];});}
    document.addEventListener('DOMContentLoaded',()=>{document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>sl(b.dataset.lang)));sl(cl);const m=document.getElementById('mobileMenuBtn'),mm=document.getElementById('mobileMenu');if(m&&mm){m.addEventListener('click',()=>{const o=mm.classList.toggle('active');m.setAttribute('aria-expanded',o);mm.setAttribute('aria-hidden',!o);});mm.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{mm.classList.remove('active');m.setAttribute('aria-expanded','false');mm.setAttribute('aria-hidden','true');}));}});
    </script>
</body>
</html>
