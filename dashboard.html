<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — LUXE INVITE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #D4AF37;
            --bg: #0A0908;
            --surface: rgba(255,255,255,0.04);
            --text: #FFFFFF;
            --muted: rgba(255,255,255,0.7);
            --border-glass: rgba(255,255,255,0.08);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            overflow-x:hidden;
        }
        /* Background */
        .bg-gradient {
            position:fixed;
            inset:0;
            background: radial-gradient(circle at 20% 80%, rgba(212, 175, 55, 0.12), transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(212, 175, 55, 0.06), transparent 50%);
            pointer-events:none;
            z-index:-2;
        }
        /* Header */
        .lux-header {
            position: fixed;
            top:0; left:0; right:0;
            padding:20px 40px;
            background: rgba(10,9,8,0.9);
            backdrop-filter: blur(12px);
            border-bottom:1px solid var(--border-glass);
            z-index:100;
        }
        .lux-header-inner {
            max-width:1200px;
            margin:0 auto;
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:32px;
        }
        .logo {
            display:flex; align-items:center; gap:12px;
            text-decoration:none; color:var(--text);
        }
        .logo-icon {
            width:32px; height:32px; border:2px solid var(--primary); border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-family: 'Cormorant Garamond', serif; font-size:18px; color:var(--primary);
        }
        .logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-size:24px; letter-spacing:3px; text-transform:uppercase;
        }
        .nav { display:flex; gap:40px; align-items:center; }
        .nav a {
            color: var(--muted); text-decoration:none;
            font-size:13px; letter-spacing:2px; text-transform:uppercase;
            transition:color 0.3s ease;
        }
        .nav a:hover { color:var(--primary); }
        .btn-primary {
            background: var(--primary); color:#0A0908; border:none;
            padding:14px 32px; border-radius:8px;
            font-family: 'Montserrat', sans-serif; font-size:13px; font-weight:600;
            letter-spacing:2px; text-transform:uppercase; text-decoration:none;
            cursor:pointer; transition: all 0.3s ease;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow:0 10px 30px rgba(212,175,55,0.3); }
        .btn-secondary {
            background: transparent; color:var(--text);
            border:1px solid var(--border-glass);
            padding:12px 28px; border-radius:8px;
            font-size:13px; letter-spacing:2px; text-transform:uppercase; text-decoration:none;
            cursor:pointer; transition: all 0.3s ease;
        }
        /* Language Switcher */
        .lang-switcher {
            display:flex;
            gap:8px;
            align-items:center;
        }
        .lang-btn {
            padding:8px 14px;
            background: transparent;
            border:1px solid var(--border-glass);
            color: var(--muted);
            font-size:13px;
            font-weight:500;
            letter-spacing:1px;
            border-radius:6px;
            cursor:pointer;
            transition: all 0.3s ease;
        }
        .lang-btn.active {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(212,175,55,0.1);
        }
        .lang-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .btn-secondary:hover { border-color:var(--primary); color:var(--primary); }
        /* Dashboard */
        .container {
            max-width:1200px;
            margin:0 auto;
            padding:0 40px;
        }
        .dashboard {
            padding-top:160px;
            padding-bottom:100px;
        }
        .section-title {
            margin-bottom:60px;
        }
        .section-pre {
            color:var(--primary);
            font-size:13px;
            letter-spacing:4px;
            text-transform: uppercase;
            margin-bottom:16px;
        }
        .section-heading {
            font-family: 'Cormorant Garamond', serif;
            font-size:52px;
            font-weight:400;
        }
        /* Stats Grid */
        .stats-grid {
            display:grid;
            grid-template-columns: repeat(3, 1fr);
            gap:32px;
            margin-bottom:60px;
        }
        .stat-card {
            padding:40px 32px;
            border:1px solid var(--border-glass);
            background: var(--surface);
            text-align:center;
        }
        .stat-number {
            font-family: 'Cormorant Garamond', serif;
            font-size:48px;
            color:var(--primary);
            margin-bottom:8px;
        }
        .stat-label {
            font-size:13px;
            letter-spacing:2px;
            text-transform: uppercase;
            color:var(--muted);
        }
        /* Invitations List */
        .inv-list {
            display:flex;
            flex-direction:column;
            gap:20px;
        }
        .inv-item {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:32px;
            border:1px solid var(--border-glass);
            background: var(--surface);
        }
        .inv-info h4 {
            font-family: 'Cormorant Garamond', serif;
            font-size:24px;
            margin-bottom:4px;
            font-weight:400;
        }
        .inv-info p {
            color:var(--muted);
            font-size:14px;
        }
        .inv-actions {
            display:flex;
            gap:16px;
        }
        .create-btn {
            margin-top:40px;
            text-align:center;
        }
        /* Mobile */
        @media (max-width: 900px) {
            .lux-header { padding:16px 20px; }
            .nav { display:none; }
            .stats-grid { grid-template-columns:1fr; }
            .inv-item { flex-direction:column; align-items:flex-start; gap:16px; }
            .section-heading { font-size:38px; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <header class="lux-header">
        <div class="lux-header-inner">
            <a href="index.html" class="logo">
                <div class="logo-icon">L</div>
                <div class="logo-text">LUXE INVITE</div>
            </a>
            <nav class="nav">
                <a href="index.html#features" data-i18n="nav_features">Features</a>
                <a href="templates.html" data-i18n="nav_templates">Templates</a>
            </nav>
            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="hy">Հայ</button>
                <button class="lang-btn" data-lang="ru">Рус</button>
                <button class="lang-btn" data-lang="en">Eng</button>
            </div>
            <a href="constructor.html" class="btn-primary" data-i18n="nav_create">Create New</a>
        </div>
    </header>

    <script src="js/app.js" defer></script>
    <script src="js/i18n.js" defer></script>
    <section class="dashboard">
        <div class="container">
            <div class="section-title">
                <div class="section-pre" data-i18n="dash_pre">DASHBOARD</div>
                <h2 class="section-heading" data-i18n="dash_title">Your Invitations</h2>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number">1</div>
                    <div class="stat-label" data-i18n="dash_total">Total Invitations</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">142</div>
                    <div class="stat-label" data-i18n="dash_views">Views</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">89</div>
                    <div class="stat-label" data-i18n="dash_rsvps">RSVPs</div>
                </div>
            </div>

            <h3 class="section-subheading" data-i18n="dash_your_invs">Your Invitations</h3>
            <div class="inv-list">
                <div class="inv-item">
                    <div class="inv-info">
                        <h4>Ani & Davit — Wedding</h4>
                        <p>Created: July 20, 2026</p>
                    </div>
                    <div class="inv-actions">
                        <a href="invitation.html" class="btn-secondary" data-i18n="dash_view">View</a>
                        <a href="constructor.html" class="btn-primary" data-i18n="dash_edit">Edit</a>
                    </div>
                </div>
            </div>

            <div class="create-btn">
                <a href="constructor.html" class="btn-primary" data-i18n="dash_create">Create New Invitation</a>
            </div>
        </div>
    </section>

    <footer class="lux-footer">
        <div class="container">
            <p data-i18n="footer_copyright">© 2026 LUXE INVITE. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Language data
        const translations = {
            hy: {
                nav_features: 'Հնարավորություններ',
                nav_templates: 'Նախագծեր',
                nav_create: 'Ստեղծել նոր',
                dash_pre: 'ՎԱՀԱՆԱԿ',
                dash_title: 'Քո հրավերները',
                dash_total: 'Ընդհանուր հրավերներ',
                dash_views: 'Դիտումներ',
                dash_rsvps: 'RSVP-ներ',
                dash_your_invs: 'Քո հրավերները',
                dash_view: 'Դիտել',
                dash_edit: 'Խմբագրել',
                dash_create: 'Ստեղծել նոր հրավեր',
                footer_copyright: '© 2026 LUXE INVITE. Բոլոր իրավունքները պաշտպանված են։'
            },
            ru: {
                nav_features: 'Возможности',
                nav_templates: 'Шаблоны',
                nav_create: 'Создать',
                dash_pre: 'ПАНЕЛЬ УПРАВЛЕНИЯ',
                dash_title: 'Ваши приглашения',
                dash_total: 'Всего приглашений',
                dash_views: 'Просмотры',
                dash_rsvps: 'RSVP',
                dash_your_invs: 'Ваши приглашения',
                dash_view: 'Просмотр',
                dash_edit: 'Редактировать',
                dash_create: 'Создать новое приглашение',
                footer_copyright: '© 2026 LUXE INVITE. Все права защищены.'
            },
            en: {
                nav_features: 'Features',
                nav_templates: 'Templates',
                nav_create: 'Create New',
                dash_pre: 'DASHBOARD',
                dash_title: 'Your Invitations',
                dash_total: 'Total Invitations',
                dash_views: 'Views',
                dash_rsvps: 'RSVPs',
                dash_your_invs: 'Your Invitations',
                dash_view: 'View',
                dash_edit: 'Edit',
                dash_create: 'Create New Invitation',
                footer_copyright: '© 2026 LUXE INVITE. All rights reserved.'
            }
        };

        let currentLang = localStorage.getItem('luxe_lang') || 'hy';

        function switchLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('luxe_lang', lang);
            document.documentElement.lang = lang;
            
            // Update buttons
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });

            // Update text content
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
        }

        // Initialize language switcher
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => switchLanguage(btn.dataset.lang));
            });
            switchLanguage(currentLang);
        });
    </script>
</body>
</html>
