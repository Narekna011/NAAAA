<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — LUXE INVITE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="lux-bg-gradient"></div>
    <section style="min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:80px 20px;">
        <div class="container" style="max-width:600px;">
            <div style="font-family:'Cormorant Garamond',serif;font-size:120px;font-weight:300;color:var(--gold);line-height:1;margin-bottom:24px;">404</div>
            <h2 class="lux-section-heading" data-i18n="nf_title" style="margin-bottom:16px;">Page Not Found</h2>
            <p class="muted" style="margin-bottom:40px;" data-i18n="nf_desc">The page you are looking for does not exist or has been moved.</p>
            <a href="index.html" class="lux-btn-primary" data-i18n="nf_home">Back to Home</a>
        </div>
    </section>
    <script>
    const NF_T={hy:{nf_title:'Էջը չի գտնվել',nf_desc:'Այս էջը գոյություն չունի կամ տեղափոխվել է։',nf_home:'Գլխավոր էջ'},ru:{nf_title:'Страница не найдена',nf_desc:'Страница, которую вы ищете, не существует или была перемещена.',nf_home:'На главную'},en:{nf_title:'Page Not Found',nf_desc:'The page you are looking for does not exist or has been moved.',nf_home:'Back to Home'}};
    let cl=localStorage.getItem('lux_lang')||'hy';
    const d=NF_T[cl]||NF_T.en;document.querySelectorAll('[data-i18n]').forEach(e=>{const k=e.getAttribute('data-i18n');if(d[k])e.textContent=d[k];});
    </script>
</body>
</html>
