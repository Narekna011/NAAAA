<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact — LUXE INVITE</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="lux-bg-gradient"></div>
    <header class="lux-header">
        <div class="lux-header-inner">
            <a href="index.html" class="logo"><span class="lux-logo-icon">L</span><span class="lux-logo-text">LUXE INVITE</span></a>
            <nav class="lux-nav">
                <a href="#features" data-i18n="nav_features">Features</a>
                <a href="templates.html" data-i18n="nav_templates">Templates</a>
                <a href="#contact" data-i18n="nav_contact">Contact</a>
            </nav>
            <div class="lux-lang-switcher">
                <button class="lang-btn" data-lang="hy">HY</button>
                <button class="lang-btn" data-lang="ru">RU</button>
                <button class="lang-btn" data-lang="en">EN</button>
            </div>
            <div class="lux-header-actions">
                <a href="dashboard.html" class="btn-secondary" data-i18n="nav_dashboard">Dashboard</a>
                <a href="constructor.html" class="lux-btn-primary" data-i18n="nav_create">Create</a>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top:160px; padding-bottom:80px; max-width:720px;">
        <h1 data-i18n="contact_title">Contact Us</h1>
        <form id="contactForm" class="form-grid" aria-label="Contact form">
            <label for="c_name">Name</label>
            <input id="c_name" name="name" class="form-input" required>
            <label for="c_email">Email</label>
            <input id="c_email" name="email" type="email" class="form-input" required>
            <label for="c_msg">Message</label>
            <textarea id="c_msg" name="message" class="form-input" rows="5" required></textarea>
            <div class="form-actions">
                <button id="c_send" type="button" class="btn-primary">Send</button>
                <a href="https://wa.me/" class="btn-secondary">WhatsApp</a>
            </div>
        </form>
    </main>

    <footer class="lux-footer">
        <div class="container">
            <div class="footer-grid">
                <div class="lux-footer-col">
                    <a href="index.html" class="logo footer-logo"><span class="lux-logo-icon">L</span><span class="lux-logo-text">LUXE INVITE</span></a>
                    <p class="muted" data-i18n="footer_desc">Premium digital invitations for unforgettable moments.</p>
                </div>
                <div class="lux-footer-col">
                    <h4 data-i18n="footer_nav">Navigation</h4>
                    <a href="templates.html" data-i18n="nav_templates">Templates</a>
                    <a href="pricing.html">Pricing</a>
                    <a href="about.html" data-i18n="nav_about">About</a>
                </div>
                <div class="lux-footer-col">
                    <h4 data-i18n="footer_contact">Contact</h4>
                    <a href="mailto:hello@luxeinvite.com">hello@luxeinvite.com</a>
                    <a href="contacts.html" data-i18n="nav_contact">Contact Page</a>
                </div>
            </div>
            <div class="lux-footer-bottom">
                <p data-i18n="footer_copyright">© 2026 LUXE INVITE. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/app.js" defer></script>
    <script src="js/i18n.js" defer></script>
    <script>
        document.getElementById('c_send').addEventListener('click', function(){
            const name = document.getElementById('c_name').value.trim();
            const email = document.getElementById('c_email').value.trim();
            const msg = document.getElementById('c_msg').value.trim();
            if(!name || !email || !msg){ window.showToast('Please fill all fields'); return; }
            const lead = { name, email, message: msg };
            window.luxStorage.saveLead(lead).then(()=>{
                window.showToast('Thanks! We will be in touch.');
                document.getElementById('contactForm').reset();
            }).catch(()=>window.showToast('Failed to save lead'));
        });
    </script>
</body>
</html>
