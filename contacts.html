<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — LUXE INVITE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="lux-bg-gradient"></div>
    <header class="lux-header" id="luxHeader">
        <div class="container lux-header-inner">
            <a href="index.html" class="lux-logo"><span class="lux-logo-icon">L</span><span class="lux-logo-text">LUXE INVITE</span></a>
            <nav class="lux-nav"><a href="index.html#features" data-i18n="nav_features">Features</a><a href="templates.html" data-i18n="nav_templates">Templates</a><a href="pricing.html" data-i18n="nav_pricing">Pricing</a></nav>
            <div class="lux-lang-switcher"><button class="lang-btn" data-lang="hy">HY</button><button class="lang-btn" data-lang="ru">RU</button><button class="lang-btn" data-lang="en">EN</button></div>
            <div class="lux-header-actions"><a href="dashboard.html" class="lux-btn-secondary" data-i18n="nav_dashboard">Dashboard</a><a href="constructor.html" class="lux-btn-primary" data-i18n="nav_create">Create</a></div>
            <button class="lux-mobile-menu-btn" type="button" aria-label="Open menu" aria-expanded="false" id="mobileMenuBtn">☰</button>
        </div>
    </header>
    <div class="lux-mobile-menu" id="mobileMenu" aria-hidden="true"><a href="index.html#features" data-i18n="nav_features">Features</a><a href="templates.html" data-i18n="nav_templates">Templates</a><a href="pricing.html" data-i18n="nav_pricing">Pricing</a><a href="dashboard.html" data-i18n="nav_dashboard">Dashboard</a><a href="constructor.html" data-i18n="nav_create">Create</a></div>
    <section style="padding-top:160px;padding-bottom:80px;"><div class="container" style="max-width:720px;">
        <div class="lux-section-title"><div class="lux-section-pre" data-i18n="contact_pre">CONTACT</div><h2 class="lux-section-heading" data-i18n="contact_title">Contact Us</h2></div>
        <p class="muted" style="text-align:center;margin-bottom:48px;" data-i18n="contact_desc">Fill the form or contact us via WhatsApp / Telegram / Instagram — we'll reply fast.</p>
        <form id="contactForm" style="display:flex;flex-direction:column;gap:16px;">
            <input id="c_name" class="form-input" placeholder="Your name" aria-label="Your name" />
            <input id="c_email" class="form-input" placeholder="Email or phone" aria-label="Email or phone" />
            <textarea id="c_msg" class="form-input" rows="5" placeholder="Message"></textarea>
            <div class="form-actions"><button id="c_send" type="button" class="lux-btn-primary" data-i18n="contact_send">Send Request</button><a href="https://wa.me/" class="lux-btn-secondary">WhatsApp</a></div>
        </form>
    </div></section>
    <footer class="lux-footer"><div class="container"><div class="lux-footer-bottom"><p data-i18n="footer_copyright">© 2026 LUXE INVITE. All rights reserved.</p></div></div></footer>
    <div id="luxToast" class="lux-toast" aria-live="polite"></div>
    <script src="js/app.js" defer></script>
    <script>
    const C_T={hy:{nav_features:'Հնարավորություններ',nav_templates:'Նախագծեր',nav_pricing:'Գներ',nav_dashboard:'Վահանակ',nav_create:'Ստեղծել',contact_pre:'ԿԱՊ',contact_title:'Կապվեք մեզ հետ',contact_desc:'Լրացրեք ձևը կամ կապվեք մեզ հետ WhatsApp / Telegram / Instagram-ի միջոցով։',contact_send:'Ուղարկել հարցումը',footer_copyright:'© 2026 LUXE INVITE. Բոլոր իրավունքները պաշտպանված են։'},ru:{nav_features:'Возможности',nav_templates:'Шаблоны',nav_pricing:'Цены',nav_dashboard:'Панель',nav_create:'Создать',contact_pre:'КОНТАКТ',contact_title:'Свяжитесь с нами',contact_desc:'Заполните форму или свяжитесь с нами через WhatsApp / Telegram / Instagram.',contact_send:'Отправить запрос',footer_copyright:'© 2026 LUXE INVITE. Все права защищены.'},en:{nav_features:'Features',nav_templates:'Templates',nav_pricing:'Pricing',nav_dashboard:'Dashboard',nav_create:'Create',contact_pre:'CONTACT',contact_title:'Contact Us',contact_desc:"Fill the form or contact us via WhatsApp / Telegram / Instagram — we'll reply fast.",contact_send:'Send Request',footer_copyright:'© 2026 LUXE INVITE. All rights reserved.'}};
    let cl=localStorage.getItem('lux_lang')||'hy';
    function sl(l){cl=l;localStorage.setItem('lux_lang',l);document.documentElement.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));const d=C_T[l]||C_T.en;document.querySelectorAll('[data-i18n]').forEach(e=>{const k=e.getAttribute('data-i18n');if(d[k])e.textContent=d[k];});}
    document.addEventListener('DOMContentLoaded',()=>{document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>sl(b.dataset.lang)));sl(cl);const m=document.getElementById('mobileMenuBtn'),mm=document.getElementById('mobileMenu');if(m&&mm){m.addEventListener('click',()=>{const o=mm.classList.toggle('active');m.setAttribute('aria-expanded',o);mm.setAttribute('aria-hidden',!o);});mm.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{mm.classList.remove('active');m.setAttribute('aria-expanded','false');mm.setAttribute('aria-hidden','true');}));}document.getElementById('c_send').addEventListener('click',()=>{const n=document.getElementById('c_name').value.trim(),e=document.getElementById('c_email').value.trim(),m=document.getElementById('c_msg').value.trim();if(!n||!e||!m){window.showToast('Please fill all fields','info');return;}window.showToast('Thanks! We will be in touch.','success');document.getElementById('contactForm').reset();});});
    </script>
</body>
</html>
