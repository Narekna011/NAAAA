<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Templates | LUXE INVITE</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #D4AF37;
            --bg: #0A0908;
            --surface: rgba(255,255,255,0.04);
            --text: #FFFFFF;
            --muted: rgba(255,255,255,0.6);
            --border-glass: rgba(255,255,255,0.08);
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            margin:0;
        }
        .lux-header {
            position: fixed;
            top:0; left:0; right:0;
            background: rgba(10,9,8,0.9);
            backdrop-filter: blur(12px);
            border-bottom:1px solid var(--border-glass);
            padding:20px 40px;
            z-index:100;
        }
        .lux-header-inner {
            max-width:1200px;
            margin:0 auto;
            display:flex;
            justify-content: space-between;
            align-items:center;
        }
        .logo {
            display:flex;
            gap:12px;
            align-items:center;
            font-family: 'Cormorant Garamond', serif;
            font-size:24px;
            letter-spacing:2px;
            color:var(--text);
            text-decoration: none;
        }
        .logo-icon {
            width:32px;
            height:32px;
            border:2px solid var(--primary);
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:16px;
            color:var(--primary);
        }
        .nav {
            display:flex;
            gap:32px;
        }
        .nav a {
            color: var(--muted);
            text-decoration: none;
            font-size:13px;
            letter-spacing:2px;
            text-transform: uppercase;
        }
        /* Language Switcher */
        .lang-switcher {
            display:flex;
            gap:8px;
            align-items:center;
        }
        .lang-btn {
            padding:8px 14px;
            background: transparent;
            border:1px solid var(--border-glass);
            color: var(--muted);
            font-size:13px;
            font-weight:500;
            letter-spacing:1px;
            border-radius:6px;
            cursor:pointer;
            transition: all 0.3s ease;
        }
        .lang-btn.active {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(212,175,55,0.1);
        }
        .lang-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .btn-primary {
            padding:12px 28px;
            border-radius:8px;
            border:none;
            background: var(--primary);
            color:#0A0908;
            font-size:13px;
            font-weight:600;
            letter-spacing:2px;
            text-transform: uppercase;
            cursor:pointer;
            text-decoration: none;
        }
        .container {
            max-width:1200px;
            margin:0 auto;
            padding:0 40px;
        }
        .templates-page {
            padding-top:160px;
            padding-bottom:100px;
        }
        .section-title {
            text-align:center;
            margin-bottom:60px;
        }
        .section-pre {
            color: var(--primary);
            font-size:13px;
            letter-spacing:4px;
            text-transform: uppercase;
            margin-bottom:16px;
        }
        .section-heading {
            font-family: 'Cormorant Garamond', serif;
            font-size:52px;
            font-weight:400;
            margin:0;
        }
        .templates-grid {
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap:32px;
        }
        .template-card {
            position:relative;
            overflow:hidden;
            border-radius:12px;
            cursor:pointer;
            transition: transform 0.4s ease;
        }
        .template-card:hover {
            transform: translateY(-10px);
        }
        .template-card img {
            width:100%;
            aspect-ratio:3/4;
            object-fit: cover;
            filter:brightness(0.75);
            transition: all 0.6s ease;
        }
        .template-card:hover img {
            transform: scale(1.05);
            filter:brightness(0.55);
        }
        .template-overlay {
            position:absolute;
            inset:0;
            background: linear-gradient(180deg, transparent, rgba(0,0,0,0.9));
            padding:24px;
            display:flex;
            flex-direction:column;
            justify-content:flex-end;
            opacity:0;
            transition: opacity 0.4s ease;
        }
        .template-card:hover .template-overlay { opacity:1; }
        .template-title {
            font-family: 'Cormorant Garamond', serif;
            font-size:28px;
            margin-bottom:16px;
        }
        .template-use-btn {
            align-self:flex-start;
            padding:10px 24px;
            background:var(--primary);
            color:#0A0908;
            border:none;
            border-radius:8px;
            font-size:13px;
            letter-spacing:2px;
            text-transform: uppercase;
            font-weight:600;
            cursor:pointer;
        }
        .lux-footer {
            border-top:1px solid var(--border-glass);
            padding:40px 0;
            text-align:center;
            color:var(--muted);
        }
        @media (max-width:768px) {
            .lux-header { padding:16px 20px; }
            .section-heading { font-size:36px; }
            .templates-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="lux-bg-gradient"></div>

    <header class="lux-header">
        <div class="lux-header-inner">
            <a href="index.html" class="logo">
                <span class="logo-icon">L</span>
                <span>LUXE INVITE</span>
            </a>
            <nav class="nav">
                <a href="index.html#features" data-i18n="nav_features">Features</a>
                <a href="templates.html" data-i18n="nav_templates">Templates</a>
                <a href="index.html#contact" data-i18n="nav_contact">Contact</a>
            </nav>
            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="hy">Հայ</button>
                <button class="lang-btn" data-lang="ru">Рус</button>
                <button class="lang-btn" data-lang="en">Eng</button>
            </div>
            <a href="constructor.html" class="btn-primary" data-i18n="nav_create">Create Invitation</a>
        </div>
    </header>

    <script src="js/app.js" defer></script>
    <script src="js/i18n.js" defer></script>
    <section class="templates-page">
        <div class="container">
            <div class="section-title">
                <div class="section-pre" data-i18n="tpls_pre">OUR TEMPLATES</div>
                <h2 class="section-heading" data-i18n="tpls_title">Choose Your Style</h2>
            </div>
            <div class="templates-grid" id="templatesGrid">
            </div>
        </div>
    </section>

    <footer class="lux-footer">
        <p data-i18n="footer_copyright">© 2026 LUXE INVITE. All rights reserved.</p>
    </footer>

    <script>
        // Language data
        const translations = {
            hy: {
                nav_features: 'Հնարավորություններ',
                nav_templates: 'Նախագծեր',
                nav_contact: 'Կապ',
                nav_create: 'Ստեղծել հրավեր',
                tpls_pre: 'ՄԵՐ ՆԱԽԱԳԾԵՐԸ',
                tpls_title: 'Ընտրի՛ր քո ոճը',
                footer_copyright: '© 2026 LUXE INVITE. Բոլոր իրավունքները պաշտպանված են։'
            },
            ru: {
                nav_features: 'Возможности',
                nav_templates: 'Шаблоны',
                nav_contact: 'Контакт',
                nav_create: 'Создать приглашение',
                tpls_pre: 'НАШИ ШАБЛОНЫ',
                tpls_title: 'Выберите свой стиль',
                footer_copyright: '© 2026 LUXE INVITE. Все права защищены.'
            },
            en: {
                nav_features: 'Features',
                nav_templates: 'Templates',
                nav_contact: 'Contact',
                nav_create: 'Create Invitation',
                tpls_pre: 'OUR TEMPLATES',
                tpls_title: 'Choose Your Style',
                footer_copyright: '© 2026 LUXE INVITE. All rights reserved.'
            }
        };

        let currentLang = localStorage.getItem('luxe_lang') || 'hy';

        function switchLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('luxe_lang', lang);
            document.documentElement.lang = lang;
            
            // Update buttons
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });

            // Update text content
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
        }

        // Initialize language switcher
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => switchLanguage(btn.dataset.lang));
            });
            switchLanguage(currentLang);
        });

        let templates = [];
        async function loadTemplates() {
            try {
                const res = await fetch('templates.json');
                const data = await res.json();
                templates = data.templates;
            } catch (err) {
                // Fallback data
                templates = [
                    { id:'luxury-gold', name:'Luxury Wedding Gold', thumbnail:'https://images.unsplash.com/photo-1465101108779-f0725a7590f9?w=600&h=800&fit=crop' },
                    { id:'armenian-classic', name:'Armenian Classic', thumbnail:'https://images.unsplash.com/photo-1526045431048-f857369baa09?w=600&h=800&fit=crop' },
                    { id:'modern-minimal', name:'Modern Minimal', thumbnail:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600&h=800&fit=crop' },
                    { id:'birthday-premium', name:'Birthday Premium', thumbnail:'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=600&h=800&fit=crop' }
                ];
            }
            
            const grid = document.getElementById('templatesGrid');
            grid.innerHTML = '';
            templates.forEach(tpl => {
                const card = document.createElement('div');
                card.className = 'template-card';
                card.innerHTML = `
                    <img src="${tpl.thumbnail}" alt="${tpl.name}" loading="lazy">
                    <div class="template-overlay">
                        <h3 class="template-title">${tpl.name}</h3>
                        <button class="template-use-btn" onclick="useTemplate('${tpl.id}')">Use Template</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        
        function useTemplate(id) {
            window.location.href = `constructor.html?template=${id}`;
        }
        
        loadTemplates();
    </script>
</body>
</html>
