<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation | LUXE INVITE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root{--primary:#D4AF37;--secondary:#F4E4BC;--bg:#0A0908;--surface:rgba(10,9,8,0.7);--text:#FFFFFF;--muted:rgba(255,255,255,0.7);--font:'Cormorant Garamond';--body-font:'Montserrat';}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);color:var(--text);font-family:var(--body-font);overflow-x:hidden;}
        .envelope-wrapper{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(10,9,8,0.95);z-index:999;transition:opacity 0.8s ease 0.5s,visibility 0.8s ease 0.5s;}
        .envelope-wrapper.hidden{opacity:0;visibility:hidden;}
        .envelope{width:300px;height:200px;background:linear-gradient(135deg,#2a2a2a 0%,#1a1a1a 100%);position:relative;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,0.5);cursor:pointer;}
        .envelope-flap{position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(135deg,#2a2a2a 0%,#1a1a1a 100%);clip-path:polygon(0 0,50% 100%,100% 0);transform-origin:top center;transition:transform 0.6s cubic-bezier(0.23,1,0.32,1);z-index:2;}
        .envelope.open .envelope-flap{transform:rotateX(180deg);}
        .envelope-hint{position:absolute;bottom:-60px;left:50%;transform:translateX(-50%);font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--primary);white-space:nowrap;animation:pulse 2s ease-in-out infinite;}
        @keyframes pulse{0%,100%{opacity:0.5;}50%{opacity:1;}}
        .invitation-page{min-height:100vh;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 32px;overflow:hidden;}
        .inv-bg{position:absolute;inset:0;z-index:0;}
        .inv-bg img{width:100%;height:100%;object-fit:cover;filter:brightness(0.45);}
        .inv-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.5),rgba(0,0,0,0.85));}
        .inv-content{position:relative;z-index:10;max-width:700px;animation:fadeInUp 1s ease-out 0.5s both;}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
        .inv-pre{font-size:14px;letter-spacing:4px;text-transform:uppercase;color:var(--primary);margin-bottom:24px;}
        .inv-names{font-family:var(--font);font-size:clamp(36px,8vw,80px);font-weight:300;line-height:1.1;margin-bottom:20px;}
        .inv-date{font-size:16px;letter-spacing:4px;text-transform:uppercase;color:var(--primary);margin-bottom:32px;}
        .inv-venue{font-size:18px;color:var(--muted);margin-bottom:40px;}
        .inv-message{font-size:18px;line-height:1.7;color:var(--muted);margin-bottom:48px;}
        .inv-countdown{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-bottom:64px;}
        .inv-countdown div{background:var(--surface);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px 16px;min-width:100px;}
        .inv-countdown span{display:block;font-family:var(--font);font-size:36px;color:var(--primary);}
        .inv-countdown small{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
        .gold-particles{position:fixed;inset:0;z-index:5;pointer-events:none;}
        .particle{position:absolute;width:4px;height:4px;background:var(--primary);border-radius:50%;opacity:0.4;animation:pf 10s infinite linear;}
        @keyframes pf{0%{transform:translateY(100vh) rotate(0deg);opacity:0;}10%{opacity:0.6;}90%{opacity:0.6;}100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}}
    </style>
</head>
<body>
    <div class="envelope-wrapper" id="envelopeWrapper">
        <div class="envelope" id="envelope"><div class="envelope-flap"></div><div class="envelope-hint">Click to open</div></div>
    </div>
    <button class="music-btn" id="musicBtn" aria-label="Toggle music">♪</button>
    <audio id="bgMusic" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>
    <div class="gold-particles" id="goldParticles"></div>
    <div class="invitation-page">
        <div class="inv-bg" id="invBg"><img src="https://images.pexels.com/photos/169198/pexels-photo-169198.jpeg?auto=compress&cs=tinysrgb&w=1920&h=1080&fit=crop" id="bgImg" alt="Wedding celebration" loading="lazy"></div>
        <div class="inv-content">
            <div class="inv-pre" id="invPre">You're invited</div>
            <div class="inv-names" id="invNames">Ani & Davit</div>
            <div class="inv-date" id="invDate">20 August 2026</div>
            <div class="inv-venue" id="invVenue">Yerevan, Armenia</div>
            <div class="inv-message" id="invMsg">Սիրով հրավիրում ենք ձեզ մեր կյանքի ամենակարևոր օրը նշելու համար:</div>
            <div class="inv-countdown" id="countdown">
                <div><span id="days">00</span><small>Days</small></div>
                <div><span id="hours">00</span><small>Hours</small></div>
                <div><span id="minutes">00</span><small>Minutes</small></div>
                <div><span id="seconds">00</span><small>Seconds</small></div>
            </div>
            <div class="rsvp-area">
                <div class="rsvp-btns">
                    <button class="rsvp-btn" id="rsvpYes" onclick="rsvp('yes')">Yes, I'll be there</button>
                    <button class="rsvp-btn secondary" id="rsvpNo" onclick="rsvp('no')">Unfortunately I can't</button>
                </div>
                <div id="rsvpStatus" class="rsvp-status"></div>
            </div>
        </div>
    </div>
    <script src="js/countdown.js"></script>
    <script>
    let templates=[];
    async function initInvitation(){
        try{const r=await fetch('templates.json');const d=await r.json();templates=d.templates;}catch(e){templates=[{id:"luxury-gold",name:"Luxury Wedding Gold",background:"https://images.pexels.com/photos/169198/pexels-photo-169198.jpeg?auto=compress&cs=tinysrgb&w=1920&h=1080&fit=crop",colors:{primary:"#D4AF37",secondary:"#F4E4BC",background:"#0A0908",surface:"rgba(10,9,8,0.7)",text:"#FFFFFF",textMuted:"rgba(255,255,255,0.7)"},font:"Cormorant Garamond",bodyFont:"Montserrat",defaultNames:"Ani & Davit",defaultDate:"2026-08-20",defaultVenue:"Yerevan, Armenia",defaultMessage:"Սիրով հրավիրում ենք ձեզ մեր կյանքի ամենակարևոր օրը նշելու համար:",music:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"}];}
        const p=new URLSearchParams(location.search);const tid=p.get('template')||'luxury-gold';
        const tpl=templates.find(t=>t.id===tid)||templates[0];
        document.documentElement.style.setProperty('--primary',tpl.colors.primary);document.documentElement.style.setProperty('--secondary',tpl.colors.secondary);document.documentElement.style.setProperty('--bg',tpl.colors.background);document.documentElement.style.setProperty('--surface',tpl.colors.surface);document.documentElement.style.setProperty('--text',tpl.colors.text);document.documentElement.style.setProperty('--muted',tpl.colors.textMuted);document.documentElement.style.setProperty('--font',tpl.font);document.documentElement.style.setProperty('--body-font',tpl.bodyFont);
        document.getElementById('bgImg').src=tpl.background;
        const names=p.get('names'),date=p.get('date'),venue=p.get('venue'),msg=p.get('msg');
        if(names)document.getElementById('invNames').textContent=decodeURIComponent(names);
        if(venue)document.getElementById('invVenue').textContent=decodeURIComponent(venue);
        if(msg)document.getElementById('invMsg').textContent=decodeURIComponent(msg);
        if(date){document.getElementById('invDate').textContent=new Date(date).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});initCountdown(date,{days:'days',hours:'hours',minutes:'minutes',seconds:'seconds'});}
        const c=document.getElementById('goldParticles');c.innerHTML='';
        for(let i=0;i<30;i++){const el=document.createElement('div');el.className='particle';el.style.left=Math.random()*100+'%';el.style.animationDelay=Math.random()*10+'s';el.style.animationDuration=(8+Math.random()*8)+'s';c.appendChild(el);}
        const w=document.getElementById('envelopeWrapper'),e=document.getElementById('envelope');
        e.addEventListener('click',()=>{e.classList.add('open');setTimeout(()=>w.classList.add('hidden'),600);});
        const audio=document.getElementById('bgMusic'),btn=document.getElementById('musicBtn');
        if(tpl.music){audio.querySelector('source').src=tpl.music;audio.load();}
        let playing=false;
        btn.addEventListener('click',()=>{if(playing){audio.pause();btn.textContent='♪';}else{audio.play().catch(()=>{});btn.textContent='♫';}playing=!playing;});
    }
    function rsvp(r){const y=document.getElementById('rsvpYes'),n=document.getElementById('rsvpNo'),s=document.getElementById('rsvpStatus');y.disabled=true;n.disabled=true;if(r==='yes'){s.textContent="Thank you! We can't wait to see you!";y.style.opacity='0.5';}else{s.textContent="We're sorry you can't make it!";n.style.opacity='0.5';}}
    window.addEventListener('DOMContentLoaded',initInvitation);
    </script>
</body>
</html>
